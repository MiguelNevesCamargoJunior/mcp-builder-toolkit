documentation:
  - changed-files:
      - any-glob-to-any-file: ['docs/**', '*.md', '.github/ISSUE_TEMPLATE/**', '.github/PULL_REQUEST_TEMPLATE/**']

core:
  - changed-files:
      - any-glob-to-any-file: ['src/mcp_builder/**']

testing:
  - changed-files:
      - any-glob-to-any-file: ['tests/**']

ci:
  - changed-files:
      - any-glob-to-any-file: ['.github/workflows/**', '.github/dependabot.yml']

security:
  - changed-files:
      - any-glob-to-any-file: ['SECURITY.md', '.github/workflows/security.yml']

dependencies:
  - changed-files:
      - any-glob-to-any-file: ['pyproject.toml', 'uv.lock']

release:
  - changed-files:
      - any-glob-to-any-file: ['CHANGELOG.md', 'docs/release-notes-*.md']
