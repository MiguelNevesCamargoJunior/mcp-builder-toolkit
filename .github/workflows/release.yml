name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.12
      - name: Install project
        run: uv sync --all-extras --locked
      - name: Quality gates
        run: |
          uv run ruff format --check src tests
          uv run ruff check src tests
          uv run mypy src
          uv run pytest --cov=mcp_builder --cov-branch --cov-report=term-missing -q
      - name: Build
        run: uv build
      - name: Generate SBOM
        run: >-
          uv export --preview-features sbom-export --format cyclonedx1.5
          --no-dev --locked --output-file sbom.cdx.json
      - name: Sigstore sign (wheel/sdist)
        uses: sigstore/gh-action-sigstore-python@v3.0.0
        with:
          inputs: ./dist/*.tar.gz ./dist/*.whl
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist/
            sbom.cdx.json
      - name: Create GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --prerelease \
            --title "MCP Builder Toolkit $GITHUB_REF_NAME" \
            --notes-file docs/release-notes-0.1.0.md \
            dist/* sbom.cdx.json
      - name: Publish to PyPI (trusted publishing)
        run: uv publish --check-url https://pypi.org/simple/mcp-builder-toolkit/
