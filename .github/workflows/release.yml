name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Set up Python
        run: uv python install 3.12
      - name: Install project
        run: uv sync --all-extras --locked
      - name: Quality gates
        run: |
          uv run ruff format --check src tests
          uv run ruff check src tests
          uv run mypy src
          uv run pytest --cov=mcp_builder --cov-branch --cov-report=term-missing -q
      - name: Update coverage badge in README
        run: |
          uv run python scripts/update_coverage_badge.py
          git config user.name "MCP Builder Toolkit Bot"
          git config user.email "bot@mcpbuilder.dev"
          git add README.md
          if git commit -m "chore: update coverage badge [skip ci]" 2>/dev/null; then
            git push
          fi
      - name: Build without local source overrides
        run: uv build --no-sources
      - name: Smoke wheel and sdist
        run: |
          for ARTIFACT in dist/*.whl dist/*.tar.gz; do
            ROOT=$(mktemp -d)
            ABS_ARTIFACT="$GITHUB_WORKSPACE/$ARTIFACT"
            cd "$ROOT"
            uvx --from "$ABS_ARTIFACT" mcp-builder --version
            uvx --from "$ABS_ARTIFACT" mcp-builder init --name distribution-smoke --no-interactive
            uvx --from "$ABS_ARTIFACT" mcp-builder validate
            uvx --from "$ABS_ARTIFACT" mcp-builder generate
            uvx --from "$ABS_ARTIFACT" mcp-builder doctor
            cd "$GITHUB_WORKSPACE"
            rm -rf "$ROOT"
          done
      - name: Generate runtime SBOM
        run: >-
          uv export --preview-features sbom-export --format cyclonedx1.5
          --no-dev --locked --output-file sbom.cdx.json
      - name: Upload verified artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: verified-release
          if-no-files-found: error
          path: |
            dist/
            sbom.cdx.json

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Download verified artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: verified-release
      - name: Sigstore sign wheel and sdist
        uses: sigstore/gh-action-sigstore-python@5b79a39c381910c090341a2c9b0bf022c8b387e1 # v3.4.0
        with:
          inputs: ./dist/*.tar.gz ./dist/*.whl
      - name: Create GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --prerelease \
            --title "MCP Builder Toolkit $GITHUB_REF_NAME" \
            --notes-file "docs/release-notes-${GITHUB_REF_NAME#v}.md" \
            dist/* sbom.cdx.json
      - name: Publish to TestPyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          if [ -n "${UV_PUBLISH_TOKEN:-}" ]; then
            uv publish --publish-url https://test.pypi.org/legacy/ \
              --check-url https://test.pypi.org/simple/mcp-builder-toolkit/
          else
            echo "::warning::Skipping TestPyPI — no token available."
          fi
      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          if [ -n "${UV_PUBLISH_TOKEN:-}" ]; then
            uv publish --check-url https://pypi.org/simple/mcp-builder-toolkit/
          else
            uv publish --trusted-publishing always \
              --check-url https://pypi.org/simple/mcp-builder-toolkit/
          fi
      - name: Update release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTE_FILE="docs/release-notes-${GITHUB_REF_NAME#v}.md"
          if [ -f "$NOTE_FILE" ]; then
            echo "Release notes: $NOTE_FILE"
          else
            echo "::warning::Release notes not found: $NOTE_FILE"
          fi
