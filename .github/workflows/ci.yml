name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.12", "3.13", "3.14"]
        include:
          - os: macos-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.13"
        exclude:
          - os: macos-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.14"
          - os: windows-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.14"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}
      - name: Install package
        run: uv sync --all-extras
      - name: Lint
        run: uv run ruff check src tests
      - name: Format check
        run: uv run ruff format --check src tests
      - name: Type check
        run: uv run mypy src
      - name: Golden tree check (regenerate if templates changed)
        run: |
          uv run python scripts/update_golden.py 2>&1
          if ! git diff --stat --exit-code tests/golden/; then
            echo "::error::Golden trees are out of date. Run 'uv run python scripts/update_golden.py' and commit the changes."
            git diff tests/golden/
            exit 1
          fi
      - name: Test (unit + generated-project acceptance)
        # Includes T027/T028/T042 (@pytest.mark.generated): install, quality gates, MCP client smoke.
        run: uv run pytest --cov=mcp_builder --cov-report=term-missing
        env:
          # Generated projects install FastMCP and friends; allow longer cold-cache installs.
          UV_HTTP_TIMEOUT: "120"

  container-http-smoke:
    # T053: Linux-only container build + HTTP smoke when Docker is available.
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Set up Python
        run: uv python install 3.12
      - name: Install package
        run: uv sync --all-extras
      - name: Generate HTTP+Docker project and build image
        run: |
          set -euo pipefail
          WORK=$(mktemp -d)
          cd "$WORK"
          uv run --project "$GITHUB_WORKSPACE" mcp-builder init --name http-smoke --transport streamable-http --no-interactive
          # enable docker in manifest
          python - <<'PY'
          from pathlib import Path
          import yaml
          p = Path("mcp-builder.yaml")
          data = yaml.safe_load(p.read_text())
          data["spec"]["features"]["docker"] = True
          data["spec"]["features"]["compose"] = True
          p.write_text(yaml.safe_dump(data, sort_keys=False))
          PY
          uv run --project "$GITHUB_WORKSPACE" mcp-builder generate
          docker build -t mbt-http-smoke .
          docker run -d --name mbt-http -p 8000:8000 mbt-http-smoke
          for attempt in {1..20}; do
            if curl -sS -o /dev/null http://127.0.0.1:8000/mcp; then
              break
            fi
            if [ "$attempt" -eq 20 ]; then
              docker logs mbt-http
              exit 1
            fi
            sleep 1
          done
          uv run --with 'fastmcp>=3.4.4,<3.5' python - <<'PY'
          import asyncio
          from fastmcp import Client

          async def main() -> None:
              async with Client("http://127.0.0.1:8000/mcp") as client:
                  tools = await client.list_tools()
                  names = {tool.name for tool in tools}
                  assert {"echo", "health"} <= names, names
                  result = await client.call_tool("echo", {"message": "container-ok"})
                  assert result.data == "container-ok"

          asyncio.run(main())
          PY
          docker logs mbt-http | tail -50
          docker rm -f mbt-http
