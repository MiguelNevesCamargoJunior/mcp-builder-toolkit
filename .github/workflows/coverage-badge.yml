name: Coverage badge

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Set up Python
        run: uv python install 3.12
      - name: Install package
        run: uv sync --all-extras
      - name: Run coverage
        run: uv run pytest --cov=mcp_builder --cov-branch -q
      - name: Update badge
        run: uv run python scripts/update_coverage_badge.py
      - name: Commit badge update
        run: |
          git config user.name "MCP Builder Toolkit Bot"
          git config user.email "bot@mcpbuilder.dev"
          git add README.md
          if git commit -m "chore: update coverage badge [skip ci]" 2>/dev/null; then
            git push
          fi
