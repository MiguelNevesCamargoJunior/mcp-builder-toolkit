# Wiki sync — manually triggered.
# Syncs docs/ to the GitHub Wiki.
# Usage: gh workflow run wiki-sync.yml

name: Wiki sync

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Sync docs/ to wiki
        run: |
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" /tmp/wiki
          rsync -av docs/ /tmp/wiki/
          cd /tmp/wiki
          git config user.name "MCP Builder Toolkit Bot"
          git config user.email "bot@mcpbuilder.dev"
          git add -A
          git diff --cached --quiet || git commit -m "sync docs/ to wiki [skip ci]"
          git push
