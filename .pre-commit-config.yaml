# Pre-commit hooks (optional — CI enforces the same checks).
# Install: uv run pre-commit install
# Run:     uv run pre-commit run --all-files

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types: [python]
        stages: [pre-commit]

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
        stages: [pre-commit]

      - id: mypy
        name: mypy
        entry: uv run mypy src
        language: system
        pass_filenames: false
        stages: [pre-commit]
        always_run: true

      - id: pytest-fast
        name: pytest (unit, no generated)
        entry: uv run pytest -q -m "not generated and not mcp_smoke"
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true
