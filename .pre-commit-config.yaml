repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies: [types-PyYAML, types-jsonschema, pydantic, typer]
        args: [--config-file=pyproject.toml]
        pass_filenames: false
  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest (unit, no generated)
        entry: uv run pytest -q -m "not generated and not mcp_smoke"
        language: system
        pass_filenames: false
        always_run: true
