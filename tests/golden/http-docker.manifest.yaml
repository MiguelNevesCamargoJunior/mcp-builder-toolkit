apiVersion: mcpbuilder.dev/v1alpha1
kind: MCPServerProject
metadata:
  name: http-docker-golden
  version: 0.1.0
  license: Apache-2.0
spec:
  target:
    runtime: fastmcp-python
    profile: fastmcp-python-2026.07
    protocolVersion: "2025-11-25"
  project:
    python: ">=3.12,<3.14"
    packageName: http_docker_golden
    layout: src
    dependencyManager: uv
  transport:
    type: streamable-http
    host: 127.0.0.1
    port: 8000
    path: /mcp
  features:
    tests: true
    lint: true
    typing: true
    docker: true
    compose: true
    githubActions: true
    structuredLogging: true
  scaffolds:
    exampleTool: true
