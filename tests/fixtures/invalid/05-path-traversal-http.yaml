apiVersion: mcpbuilder.dev/v1alpha1
kind: MCPServerProject
metadata:
  name: path-trav
  version: 0.1.0
spec:
  target:
    runtime: fastmcp-python
    profile: fastmcp-python-2026.07
    protocolVersion: "2025-11-25"
  project:
    python: ">=3.12,<3.15"
    packageName: path_trav
  transport:
    type: streamable-http
    host: 127.0.0.1
    port: 8000
    path: /mcp/../../etc
  features:
    tests: true
    lint: true
    typing: true
