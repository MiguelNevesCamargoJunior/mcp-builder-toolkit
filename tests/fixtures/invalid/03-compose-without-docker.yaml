apiVersion: mcpbuilder.dev/v1alpha1
kind: MCPServerProject
metadata:
  name: compose-no-docker
  version: 0.1.0
spec:
  target:
    runtime: fastmcp-python
    profile: fastmcp-python-2026.07
    protocolVersion: "2025-11-25"
  project:
    python: ">=3.12,<3.15"
    packageName: compose_no_docker
  transport:
    type: streamable-http
  features:
    tests: true
    lint: true
    typing: true
    docker: false
    compose: true
